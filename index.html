<!doctype html><html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>プリズマ・クラッシュ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#0c0a17;--bg2:#15112a;--panel:#1d1836;--panel2:#271f49;--line:#3a3163;
 --fire:#ff5a3c;--water:#33c6e6;--grass:#6fe23f;--thunder:#ffd23f;--poison:#b14cff;
 --gold:#f5c451;--bad:#ff3d6e;--text:#f3f0ff;--muted:#9a90c4;
 --r2:#9aa6c4;--r3:#5fa0ff;--r4:#c06bff;--r5:#ffcf3f;--r6:#ff5ad6;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Noto Sans JP",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body{background:radial-gradient(1100px 600px at 50% -10%,#2a2056 0%,transparent 60%),radial-gradient(600px 480px at 10% 6%,#3a1840 0%,transparent 55%),radial-gradient(600px 480px at 90% 6%,#103048 0%,transparent 55%),var(--bg);}
.orb{font-family:"Orbitron",sans-serif;}.tnum{font-variant-numeric:tabular-nums;}.muted{color:var(--muted);}
.wrap{max-width:560px;margin:0 auto;padding:12px 12px 26px;min-height:100%;position:relative;z-index:2;}
#shake{will-change:transform;}
.screen{display:none;}.screen.on{display:block;animation:pop .26s cubic-bezier(.2,.9,.25,1);}
@keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
svg.ic{display:block;width:100%;height:100%;}
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:14px;margin:11px 0;box-shadow:0 8px 26px rgba(0,0,0,.34);}
.btn{appearance:none;border:none;cursor:pointer;font-family:"Orbitron",sans-serif;font-weight:900;width:100%;border-radius:13px;padding:15px;font-size:16px;letter-spacing:.5px;color:#1a1206;background:linear-gradient(180deg,var(--gold),#e3a836);box-shadow:0 7px 18px rgba(245,196,81,.3);transition:transform .07s,filter .15s;}
.btn:active{transform:translateY(2px);}.btn:disabled{opacity:.4;filter:grayscale(.4);}
.btn.sub{background:var(--panel2);color:var(--text);border:1px solid var(--line);box-shadow:none;font-family:"Noto Sans JP";font-weight:700;}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);box-shadow:none;font-family:"Noto Sans JP";font-weight:700;font-size:14px;}
.row{display:flex;align-items:center;gap:8px;}.between{justify-content:space-between;}
.lbl{font-size:12px;color:var(--muted);font-weight:700;margin:0 0 8px 2px;letter-spacing:.4px;}
.optrow{display:flex;gap:7px;}
.opt{flex:1;text-align:center;padding:12px 4px;border-radius:12px;background:var(--panel2);border:1.5px solid var(--line);font-weight:900;font-family:"Orbitron";font-size:16px;cursor:pointer;transition:.13s;color:var(--text);}
.opt.on{background:linear-gradient(180deg,var(--gold),#e0a93a);color:#1a1206;border-color:var(--gold);box-shadow:0 0 16px rgba(245,196,81,.4);transform:translateY(-2px);}
.opt small{display:block;font-family:"Noto Sans JP";font-weight:700;font-size:10px;opacity:.85;margin-top:2px;}
/* top bar */
.tbar{display:flex;align-items:center;gap:8px;margin:4px 2px 8px;}
.tbar .cur{display:flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:6px 11px;font-family:"Orbitron";font-weight:800;font-size:14px;}
.tbar .cur svg{width:17px;height:17px;}
.iconbtn{width:36px;height:36px;border-radius:11px;background:var(--panel);border:1px solid var(--line);display:grid;place-items:center;cursor:pointer;flex:0 0 auto;}
.iconbtn svg{width:19px;height:19px;}
/* nav grid */
.menu{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mtile{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:15px;padding:15px 13px;cursor:pointer;position:relative;overflow:hidden;transition:transform .1s;}
.mtile:active{transform:scale(.97);}
.mtile .ttl{font-weight:900;font-size:15px;margin-top:7px;}
.mtile .sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4;}
.mtile .ico{width:34px;height:34px;}
.mtile .dot{position:absolute;top:10px;right:10px;width:9px;height:9px;border-radius:50%;background:var(--bad);box-shadow:0 0 8px var(--bad);pointer-events:none;}
.bigplay{grid-column:1/3;background:linear-gradient(120deg,#3a1840,#103048);}
/* hero */
.hero{text-align:center;padding:16px 0 4px;}
.hero .em{display:inline-flex;gap:7px;margin-bottom:8px;}.hero .em>span{width:30px;height:30px;filter:drop-shadow(0 0 9px currentColor);}
.hero .t2{font-weight:900;font-size:27px;letter-spacing:1px;background:linear-gradient(92deg,var(--fire),var(--gold) 33%,var(--water) 66%,var(--grass));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.hero .t1{font-family:"Orbitron";font-weight:900;font-size:11px;letter-spacing:4px;color:var(--gold);opacity:.85;}
.lvbar{height:7px;border-radius:5px;background:#2a2342;overflow:hidden;margin-top:7px;}
.lvbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#fff6c9);border-radius:5px;transition:width .5s;}
.foot{text-align:center;font-size:11px;color:var(--muted);margin-top:14px;line-height:1.7;}
/* battle */
.bbar{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 7px;}
.bbar .rnd{font-family:"Orbitron";font-weight:900;font-size:12px;color:var(--muted);}.bbar .rnd b{color:var(--text);font-size:16px;}
#oppRow{display:grid;gap:7px;margin-bottom:7px;}
.opp{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1.5px solid var(--line);border-radius:13px;padding:8px 10px;position:relative;overflow:hidden;transition:border-color .16s,box-shadow .16s,transform .1s;}
.opp.turn{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.18);}
.opp.tgt{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,196,81,.4),0 0 20px rgba(245,196,81,.25);cursor:pointer;}
.opp.down{opacity:.4;filter:grayscale(.6);}
.opp .hd{display:flex;align-items:center;gap:7px;}
.crest{width:28px;height:28px;flex:0 0 28px;}
.opp .nm{font-weight:900;font-size:12.5px;flex:1;}
.hpbar{height:8px;border-radius:5px;background:#2a1c33;overflow:hidden;margin-top:5px;position:relative;}
.hpghost{position:absolute;inset:0;background:rgba(255,255,255,.6);transition:width .5s ease .12s;pointer-events:none;}
.hpfill{position:absolute;inset:0;border-radius:5px;transition:width .25s cubic-bezier(.3,.8,.3,1);pointer-events:none;}
.pips{display:flex;gap:3px;}.kostar{display:flex;gap:2px;align-items:center;}
.badge{font-size:9px;font-weight:900;padding:2px 6px;border-radius:6px;letter-spacing:.4px;}
.b-guard{background:rgba(51,198,230,.2);color:#7fe9ff;}.b-psn{background:rgba(177,76,255,.2);color:#cf9bff;}
.b-down{background:rgba(255,61,110,.18);color:var(--bad);}.b-tap{background:var(--gold);color:#1a1206;}
.hit{animation:hsh .32s;}@keyframes hsh{0%,100%{transform:none;}25%{transform:translateX(-5px);}50%{transform:translateX(5px);}75%{transform:translateX(-3px);}}
/* self + hand */
.self{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1.5px solid var(--gold);border-radius:14px;padding:10px 12px;margin-top:7px;}
.hand{display:flex;gap:7px;overflow-x:auto;padding:7px 2px 5px;scroll-snap-type:x proximity;}
.hand::-webkit-scrollbar{height:5px;}.hand::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.gcard{flex:0 0 74px;height:92px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:5px;cursor:pointer;scroll-snap-align:center;position:relative;transition:transform .12s;}
.orbz{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;position:relative;background:radial-gradient(circle at 34% 28%,rgba(255,255,255,.45),transparent 42%),radial-gradient(circle,var(--panel2),#100c22);border:2px solid currentColor;box-shadow:0 0 13px -3px currentColor,inset 0 -6px 12px rgba(0,0,0,.5);}
.gcard:active{transform:scale(.95);}.gcard.sel{transform:translateY(-8px) scale(1.06);}.gcard.sel .orbz{box-shadow:0 0 22px currentColor,inset 0 -6px 12px rgba(0,0,0,.5);}
.gcard svg.main{display:none;}.gcard .v{font-family:"Orbitron";font-weight:900;font-size:21px;line-height:1;}
.gcard .cap{font-size:8.5px;color:var(--muted);font-weight:700;}
.gcard .et{position:absolute;top:-3px;right:-3px;width:19px;height:19px;background:#15112a;border:1px solid var(--line);border-radius:50%;padding:2px;pointer-events:none;}
.actbtns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;margin-top:8px;}
.abtn{padding:11px 4px;border-radius:12px;border:1.5px solid var(--line);background:var(--panel2);color:var(--text);font-weight:900;font-size:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.12s;}
.abtn svg{width:20px;height:20px;}.abtn:active{transform:scale(.95);}.abtn.dis{opacity:.35;pointer-events:none;}
.abtn.draw{border-color:var(--gold);}
.hint{text-align:center;font-size:12.5px;color:var(--gold);font-weight:700;margin-top:8px;min-height:18px;}
/* fever */
.fever{height:10px;border-radius:6px;background:#2a2342;overflow:hidden;margin-top:8px;position:relative;border:1px solid var(--line);}
.fever>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#ff3d6e,#ffd23f,#ff3d6e);background-size:200% 100%;transition:width .4s;animation:fvflow 1s linear infinite;}
@keyframes fvflow{to{background-position:200% 0;}}
.fever.full>i{animation:fvflow .4s linear infinite;}
.feverlbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:"Orbitron";font-weight:900;font-size:8px;letter-spacing:2px;color:#fff;text-shadow:0 1px 2px #000;pointer-events:none;}
/* overlays */
#fx{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:60;}
#flash{position:fixed;inset:0;pointer-events:none;z-index:55;opacity:0;}
.floatn{position:fixed;z-index:62;font-family:"Orbitron";font-weight:900;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.7);animation:fn 1s cubic-bezier(.2,.7,.2,1) forwards;}
@keyframes fn{0%{opacity:0;transform:translate(-50%,0) scale(.5);}15%{opacity:1;transform:translate(-50%,-6px) scale(1.3);}40%{transform:translate(-50%,-14px) scale(1);}100%{opacity:0;transform:translate(-50%,-48px) scale(.9);}}
.bigcut{position:fixed;inset:0;z-index:63;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.bigcut .txt{font-family:"Orbitron";font-weight:900;font-size:46px;letter-spacing:2px;color:#fff;opacity:0;text-shadow:0 0 30px currentColor;}
/* generic overlay (gacha/reward/detail) */
.ov{position:fixed;inset:0;z-index:70;background:rgba(8,6,18,.82);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:18px;}
.ov.on{display:flex;}
.ovcard{width:100%;max-width:430px;background:linear-gradient(180deg,var(--panel),var(--bg2));border:1.5px solid var(--line);border-radius:18px;padding:18px;text-align:center;animation:pop .25s;max-height:88vh;overflow:auto;}
/* gacha */
.banner{border-radius:16px;padding:16px;margin:11px 0;border:1.5px solid var(--line);position:relative;overflow:hidden;}
.banner h3{font-size:18px;font-weight:900;}.banner p{font-size:12px;color:var(--muted);margin-top:3px;}
.banner .glow2{position:absolute;inset:0;opacity:.18;background:radial-gradient(circle at 80% 0,currentColor,transparent 60%);pointer-events:none;}
/* pachinko lottery orb */
#lotto{width:160px;height:160px;border-radius:50%;margin:6px auto;position:relative;display:grid;place-items:center;}
#lotto .core{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#fff,#7f8cff);box-shadow:0 0 40px #7f8cff;transition:background .2s,box-shadow .2s;}
#lotto .ring{position:absolute;inset:0;border-radius:50%;border:4px solid rgba(255,255,255,.5);animation:spin 1s linear infinite;pointer-events:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.reachtxt{font-family:"Orbitron";font-weight:900;font-size:26px;letter-spacing:3px;margin-top:6px;min-height:32px;}
/* collection grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.cell{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1.5px solid var(--line);border-radius:13px;padding:9px 6px;text-align:center;cursor:pointer;position:relative;}
.cell.locked{opacity:.45;filter:grayscale(.7);}
.cell .cc{width:46px;height:46px;margin:0 auto;}
.cell .cn{font-size:11px;font-weight:900;margin-top:5px;}
.cell .eq{position:absolute;top:5px;right:5px;font-size:8px;font-weight:900;background:var(--gold);color:#1a1206;padding:1px 5px;border-radius:5px;pointer-events:none;}
.stars{font-size:10px;letter-spacing:1px;}
.tabs{display:flex;gap:7px;margin:4px 0 10px;}
.tab{flex:1;text-align:center;padding:10px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);font-weight:900;font-size:13px;cursor:pointer;}
.tab.on{background:var(--gold);color:#1a1206;border-color:var(--gold);}
.mrow{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;}
.mrow .pb{flex:1;}.mbar{height:7px;border-radius:5px;background:#2a2342;overflow:hidden;margin-top:5px;}
.mbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--grass),#aaff6b);}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.05ms!important;}}

/* ============ PRISMA UI v2 (redesign) ============ */
body{background:
 radial-gradient(1200px 760px at 50% -14%,#3a2270 0%,transparent 60%),
 radial-gradient(760px 600px at 6% 2%,#511a55 0%,transparent 55%),
 radial-gradient(760px 600px at 94% 2%,#0e3a5c 0%,transparent 55%),
 radial-gradient(1000px 760px at 50% 116%,#2a1a5c 0%,transparent 55%),
 #07060f;background-attachment:fixed;}
body::before{content:"";position:fixed;inset:-20%;z-index:0;pointer-events:none;
 background:conic-gradient(from 0deg at 50% 50%,rgba(255,90,60,.06),rgba(255,210,63,.06),rgba(111,226,63,.06),rgba(51,198,230,.06),rgba(177,76,255,.06),rgba(255,90,60,.06));
 animation:bgspin 44s linear infinite;opacity:.55;mix-blend-mode:screen;}
@keyframes bgspin{to{transform:rotate(360deg);}}
.card{background:linear-gradient(180deg,rgba(42,33,78,.74),rgba(18,14,36,.76));backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);border:1px solid rgba(255,255,255,.10);border-radius:18px;box-shadow:0 12px 32px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.07);}
.btn{position:relative;overflow:hidden;border-radius:14px;background:linear-gradient(180deg,#ffe79a,#e7ab3c 58%,#cf8f28);box-shadow:0 8px 22px rgba(245,196,81,.34),inset 0 1px 0 rgba(255,255,255,.55);}
.btn::after{content:"";position:absolute;top:-20%;left:-70%;width:45%;height:140%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.6),transparent);transform:skewX(-18deg);animation:sheen 3.6s ease-in-out infinite;}
.btn.sub,.btn.ghost{background-image:none;}
.btn.sub::after,.btn.ghost::after{display:none;}
.btn.sub{background:linear-gradient(180deg,rgba(62,50,104,.92),rgba(40,33,74,.92));}
@keyframes sheen{0%,55%{left:-70%;}100%{left:150%;}}
.iconbtn{background:linear-gradient(180deg,rgba(52,42,92,.72),rgba(30,24,56,.72));backdrop-filter:blur(6px);border-color:rgba(255,255,255,.1);}
.tbar .cur{background:linear-gradient(180deg,rgba(52,42,92,.72),rgba(30,24,56,.72));border-color:rgba(255,255,255,.12);box-shadow:0 0 14px rgba(180,120,255,.2);}
.hero{padding:22px 0 6px;}
.hero .t2{font-size:31px;letter-spacing:1.5px;filter:drop-shadow(0 3px 14px rgba(180,120,255,.45));}
.hero .t1{font-size:12px;letter-spacing:6px;}
.hero .em>span{width:34px;height:34px;animation:floaty 3s ease-in-out infinite;}
.hero .em>span:nth-child(2){animation-delay:.25s}.hero .em>span:nth-child(3){animation-delay:.5s}.hero .em>span:nth-child(4){animation-delay:.75s}.hero .em>span:nth-child(5){animation-delay:1s}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
h2.orb{background:linear-gradient(92deg,#ffffff,#c9b6ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.mtile{background:linear-gradient(160deg,rgba(60,46,110,.62),rgba(26,20,52,.74));backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:18px;box-shadow:0 10px 26px rgba(0,0,0,.4);}
.mtile .ttl{font-size:16px;}
.mtile.bigplay{background:linear-gradient(120deg,rgba(120,40,90,.6),rgba(20,60,90,.6));border:1px solid rgba(255,255,255,.14);}
.mtile.bigplay::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 85% 18%,rgba(255,210,120,.2),transparent 55%);pointer-events:none;}
.gbanner{position:relative;overflow:hidden;border-radius:20px;padding:16px;margin:12px 0;border:1.5px solid var(--rc,#c06bff);background:linear-gradient(160deg,rgba(40,30,80,.86),rgba(16,12,34,.92));box-shadow:0 14px 36px rgba(0,0,0,.45),0 0 26px -8px var(--rc,#c06bff);}
.gbanner .gb-shine{position:absolute;top:-40%;left:-60%;width:50%;height:180%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-18deg);animation:sheen 4.4s ease-in-out infinite;pointer-events:none;}
.gbanner .gb-glow{position:absolute;inset:0;background:radial-gradient(circle at 82% 0,var(--rc),transparent 62%);opacity:.2;pointer-events:none;}
.gb-head{display:flex;gap:13px;align-items:center;position:relative;}
.gb-preview{width:74px;height:74px;flex:0 0 74px;filter:drop-shadow(0 0 10px var(--rc));}
.gbanner h3{font-size:19px;font-weight:900;color:#fff;}
.gbanner p{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5;}
.gb-meta{font-size:11px;color:#fff;margin-top:6px;font-weight:700;opacity:.88;}
.skinrail{display:flex;gap:10px;overflow-x:auto;padding:6px 2px 10px;scroll-snap-type:x proximity;}
.skinrail::-webkit-scrollbar{height:5px;}.skinrail::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.skinchip{flex:0 0 94px;scroll-snap-align:center;text-align:center;border-radius:16px;padding:11px 8px 9px;background:linear-gradient(165deg,rgba(50,38,96,.72),rgba(20,15,40,.86));border:1.5px solid var(--rc,#5fa0ff);box-shadow:0 0 18px -6px var(--rc,#5fa0ff),inset 0 1px 0 rgba(255,255,255,.06);position:relative;overflow:hidden;}
.skinchip.rare::before{content:"";position:absolute;top:-40%;left:-70%;width:55%;height:180%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-18deg);animation:sheen 2.9s ease-in-out infinite;}
.sc-emb{width:56px;height:56px;margin:0 auto;filter:drop-shadow(0 0 9px var(--rc));}
.sc-nm{font-size:11px;font-weight:900;margin-top:6px;}
.opp{background:linear-gradient(180deg,rgba(38,30,70,.8),rgba(16,12,34,.84));backdrop-filter:blur(5px);border:1.5px solid rgba(255,255,255,.08);border-radius:15px;}
.self{background:linear-gradient(180deg,rgba(44,34,84,.84),rgba(18,14,38,.88));backdrop-filter:blur(6px);border-radius:16px;}
.gcard .orbz{box-shadow:0 0 16px -3px currentColor,inset 0 -6px 14px rgba(0,0,0,.55);}
#ovPull .cell{box-shadow:0 0 22px -7px currentColor;}

/* ============ REDESIGN THEME ============ */
:root{--bg:#07050e;--bg2:#110d24;--panel:#191430;--panel2:#241c46;--line:#3a2f66;}
body{background:#07050e;}
body::before{content:"";position:fixed;inset:-25%;z-index:0;pointer-events:none;
 background:radial-gradient(38% 32% at 18% 10%,rgba(255,90,60,.20),transparent 60%),radial-gradient(42% 38% at 82% 8%,rgba(51,198,230,.20),transparent 60%),radial-gradient(52% 46% at 50% 102%,rgba(176,76,255,.24),transparent 60%),radial-gradient(40% 40% at 92% 82%,rgba(111,226,63,.12),transparent 60%);
 filter:blur(26px);animation:aurora 20s ease-in-out infinite alternate;}
@keyframes aurora{0%{transform:translate(0,0) scale(1);}50%{transform:translate(-3%,2%) scale(1.1);}100%{transform:translate(3%,-2%) scale(1.05);}}
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;

function buildGenChars(total){const out=[];let i=0;const bag=[2,2,2,3,3,3,4,4,5,6,4,3,2,5,4,3,2,4,3,6,2,3,4,5,3,2,4,6];
 while(BASE_CHARS.length+out.length<total){const st=bag[i%bag.length];const arch=GEN_ARCH[(i*7+st)%GEN_ARCH.length];const el=arch.el||GEN_ELS[(i*3)%5];
  const idx=out.length;const nm=GEN_NAMES[idx%GEN_NAMES.length]+(idx>=GEN_NAMES.length?'・'+(Math.floor(idx/GEN_NAMES.length)+1):'');
  const ch={id:'g'+i,name:nm,el,star:st,skill:arch.sk,desc:arch.ds,fx:(l=>arch.fx(st,l))};
  if(st>=4 && ((i*13+st)%10<4))ch.active=GEN_ACTIVE_KEYS[(i*5+st)%GEN_ACTIVE_KEYS.length];
  out.push(ch);i++;}
 return out;}

function roleOf(c){const k=Object.keys(c.fx(1))[0];const m={firePow:'アタッカー',waterPow:'アタッカー',grassPow:'アタッカー',thunderPow:'アタッカー',anyPow:'アタッカー',crit:'クリティカル型',guardBonus:'タンク',startHp:'タンク',counterBonus:'カウンター型',healBonus:'ヒーラー',bountyHeal:'サポート',bountyDraw:'サポート',lifesteal:'吸血型',extraPoison:'毒術師',startHand:'テクニカル',respawnHp:'不死型',thunderIgnore:'貫通型'};return m[k]||'バランス';}

function _hexRgb(h){h=(h||'').replace('#','');if(h.length===3)h=h.split('').map(x=>x+x).join('');return [parseInt(h.slice(0,2),16)||0,parseInt(h.slice(2,4),16)||0,parseInt(h.slice(4,6),16)||0];}
function _mix(h,t,a){const x=_hexRgb(h),y=_hexRgb(t);return `rgb(${x.map((v,i)=>Math.round(v+(y[i]-v)*a)).join(',')})`;}
function _rgba(h,al){const x=_hexRgb(h);return `rgba(${x[0]},${x[1]},${x[2]},${al})`;}
function _lum(h){const x=_hexRgb(h).map(v=>v/255);return 0.2126*x[0]+0.7152*x[1]+0.0722*x[2];}
function applyTheme(){const s=SKIN_BY[store.equipSkin]||SKIN_BY.classic;if(!s)return;const root=document.documentElement;if(!root||!root.style)return;const c1=s.c1,c2=s.c2,acc=s.accent||s.c1;const r=root.style;
 r.setProperty('--th1',c1);r.setProperty('--th2',_mix(c1,'#ffffff',.5));

function makeBP(id,name,isAI,fx,diff,el,color){fx=fx||emptyFx();const hp=HP_BASE+(fx.startHp||0);
 const hand=[];const hs=HAND_START+(fx.startHand||0);for(let i=0;i<hs;i++)hand.push(genCard());
 return{id,name,isAI,diff:diff||'normal',fx,el:el||'fire',color:color||'#f5c451',maxHp:hp,hp,alive:true,down:false,respawnIn:0,psn:0,guard:null,barrier:0,reflect:0,atkBuff:0,weak:0,hand,ko:0,deaths:0};}
function others(S,id){return S.order.filter(x=>x!==id&&S.players[x].alive&&!S.players[x].down);}
function rmCard(p,cid){const i=p.hand.findIndex(c=>c.id===cid);if(i>=0)p.hand.splice(i,1);}
function envAtk(S){return S.env&&S.env.turns>0?S.env.atk||0:0;}
function envGuard(S){return S.env&&S.env.turns>0?S.env.guard||0:0;}
function envCrit(S){return S.env&&S.env.turns>0?S.env.crit||0:0;}
function setEnv(S,o){S.env={atk:0,guard:0,crit:0,turns:3,...o};}
function elBonus(fx,el){return (fx.anyPow||0)+(el==='fire'?fx.firePow:el==='water'?fx.waterPow:el==='grass'?fx.grassPow:el==='thunder'?fx.thunderPow:0||0);}
function applyKO(S,kid,v,evs){const k=kid?S.players[kid]:null;v.alive=false;v.down=true;v.deaths++;
 v.atkBuff=0;v.barrier=0;v.reflect=0;v.weak=DEATH_WEAK;if(v.hand&&v.hand.length)v.hand.splice(rnd(v.hand.length),1);
 v.respawnIn=(k&&false)?1:1;
 evs.push({t:'ko',who:v.id,by:kid});
 if(k){k.ko++;const bh=BOUNTY_HEAL+(k.fx.bountyHeal||0);k.hp=clamp(k.hp+bh,0,k.maxHp);const bd=BOUNTY_DRAW+(k.fx.bountyDraw||0);for(let i=0;i<bd;i++)if(k.hand.length<HAND_CAP)k.hand.push(genCard());evs.push({t:'bounty',who:kid,heal:bh});}}
function doAttack(S,aid,w,did,opts){opts=opts||{};const A=S.players[aid],D=S.players[did];rmCard(A,w.id);const evs=[];
 const e=w.element;let pw=w.power+envAtk(S)+elBonus(A.fx,e)+(A.atkBuff||0);if(A.atkBuff)A.atkBuff=0;
 if(A.weak>0){pw=Math.max(1,pw-DEATH_WEAK_AMT);A.weak--;}
 let crit=false;const cc=CRIT+envCrit(S)+(A.fx.crit||0)+(opts.bonusCrit||0);
 if(Math.random()<cc){pw+=2;crit=true;}
 let dealt=pw,note='direct',counter=0;const g=D.guard;
 if(D.barrier>0){dealt=0;note='barrier';D.barrier--;}
 else if(g){const blk=g.block+envGuard(S);
  if(CORE.includes(e)){if(beats(e,g.element)){dealt=pw+1;note='pierce';}else if(beats(g.element,e)){dealt=0;counter=3+(D.fx.counterBonus||0);note='block';}else{dealt=Math.max(0,pw-blk);note='guard';}}
  else if(e==='thunder'){dealt=A.fx.thunderIgnore?pw:Math.max(0,pw-Math.floor(blk/2));note='thunder';}
  else if(e==='poison'){dealt=Math.max(0,pw-blk);note='poison';}
  if(note==='block'){D.atkBuff=(D.atkBuff||0)+GUARD_RIPOSTE;evs.push({t:'buff',who:did,label:'反撃+'+GUARD_RIPOSTE});}
  else if(dealt<pw){D.atkBuff=(D.atkBuff||0)+1;D.hp=clamp(D.hp+1,0,D.maxHp);}
  D.guard=null;}
 else{if(e==='thunder')note='thunder';else if(e==='poison')note='poison';}
 if(note!=='barrier'&&e==='poison')D.psn=Math.min(PSN_DUR+(A.fx.extraPoison||0),D.psn+PSN_DUR+(A.fx.extraPoison||0));
 D.hp=clamp(D.hp-dealt,0,D.maxHp);
 evs.push({t:'hit',from:aid,to:did,element:e,dealt,note,crit});
 if(dealt>0&&(A.fx.lifesteal||0)>0){A.hp=clamp(A.hp+A.fx.lifesteal,0,A.maxHp);evs.push({t:'leech',who:aid,amt:A.fx.lifesteal});}
 if(opts.onHitDraw&&dealt>0&&A.hand.length<HAND_CAP){A.hand.push(genCard());}
 if(D.hp<=0)applyKO(S,aid,D,evs);
 if(D.reflect>0&&dealt>0){D.reflect--;A.hp=clamp(A.hp-dealt,0,A.maxHp);evs.push({t:'counter',from:did,to:aid,dealt});if(A.hp<=0)applyKO(S,did,A,evs);}
 if(counter>0){evs.push({t:'counter',from:did,to:aid,dealt:counter});A.hp=clamp(A.hp-counter,0,A.maxHp);if(A.hp<=0)applyKO(S,did,A,evs);}
 return evs;}
function doSpecial(S,id,card){const me=S.players[id];rmCard(me,card.id);const sp=card.spec;const foes=others(S,id);const evs=[{t:'special',who:id,spec:sp}];
 if(sp==='storm')setEnv(S,{atk:1});
 else if(sp==='mist')setEnv(S,{guard:1});
 else if(sp==='overheat')setEnv(S,{crit:0.35});
 else if(sp==='chain'){for(const f of foes){const D=S.players[f];D.hp=clamp(D.hp-2,0,D.maxHp);evs.push({t:'hit',from:id,to:f,element:'thunder',dealt:2,note:'chain',crit:false});if(D.hp<=0)applyKO(S,id,D,evs);}}

 else if(sp==='refresh'){me.psn=0;me.hp=clamp(me.hp+4,0,me.maxHp);if(me.hand.length<HAND_CAP)me.hand.push(genCard());evs.push({t:'heal',who:id,amt:4});}

/* audio */
let actx=null,muted=false;
function aInit(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(actx&&actx.state==='suspended')actx.resume();}
function tone(f,d,type='sine',vol=.2,slide){if(muted||!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.setValueAtTime(f,actx.currentTime);if(slide)o.frequency.exponentialRampToValueAtTime(slide,actx.currentTime+d);g.gain.setValueAtTime(vol,actx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d);}
function noise(d,vol=.3,freq=900,type='lowpass'){if(muted||!actx)return;const n=actx.createBufferSource(),b=actx.createBuffer(1,actx.sampleRate*d,actx.sampleRate),dt=b.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;n.buffer=b;const f=actx.createBiquadFilter();f.type=type;f.frequency.value=freq;const g=actx.createGain();g.gain.setValueAtTime(vol,actx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);n.connect(f);f.connect(g);g.connect(actx.destination);n.start();n.stop(actx.currentTime+d);}

 tap:()=>tone(560,.05,'triangle',.12),sel:()=>tone(700,.06,'triangle',.13),

/* canvas particles */
const fxc=document.getElementById('fx'),fxx=fxc.getContext('2d');let P=[],DPR=Math.min(2,devicePixelRatio||1);
function fxResize(){fxc.width=innerWidth*DPR;fxc.height=innerHeight*DPR;fxx.setTransform(DPR,0,0,DPR,0,0);}addEventListener('resize',fxResize);fxResize();
function emit(x,y,o={}){const n=o.n||14;for(let i=0;i<n;i++){const a=o.angle!=null?o.angle+(Math.random()-.5)*(o.spread||6.28):Math.random()*6.28;const sp=(o.speed||3)*(.4+Math.random()*.9);
 P.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(o.lift||0),life:0,max:(o.life||50)*(.6+Math.random()*.7),size:(o.size||3)*(.6+Math.random()*.9),color:Array.isArray(o.color)?pick(o.color):(o.color||'#fff'),grav:o.grav!=null?o.grav:.06,shape:o.shape||'dot',rot:Math.random()*6.28,vr:(Math.random()-.5)*.3});}}
function ring(x,y,color){P.push({x,y,ring:0,ringMax:36,life:0,max:26,color,shape:'ring'});}
function confetti(){for(let i=0;i<140;i++)P.push({x:Math.random()*innerWidth,y:-20-Math.random()*240,vx:(Math.random()-.5)*2,vy:2+Math.random()*3,life:0,max:220,size:4+Math.random()*5,color:pick(['#ffd23f','#ff5a3c','#33c6e6','#6fe23f','#b14cff','#f5c451']),grav:.05,shape:'rect',rot:Math.random()*6.28,vr:(Math.random()-.5)*.4});}
function fxLoop(){fxx.clearRect(0,0,fxc.width,fxc.height);for(let i=P.length-1;i>=0;i--){const p=P[i];p.life++;
 if(p.shape==='ring'){p.ring=p.ringMax*(p.life/p.max);fxx.globalAlpha=1-p.life/p.max;fxx.strokeStyle=p.color;fxx.lineWidth=3;fxx.beginPath();fxx.arc(p.x,p.y,p.ring,0,6.28);fxx.stroke();}
 else{p.vy+=p.grav;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr||0;fxx.globalAlpha=Math.max(0,1-p.life/p.max);fxx.fillStyle=p.color;
  if(p.shape==='rect'){fxx.save();fxx.translate(p.x,p.y);fxx.rotate(p.rot);fxx.fillRect(-p.size/2,-p.size/2,p.size,p.size*1.6);fxx.restore();}
  else{fxx.beginPath();fxx.arc(p.x,p.y,p.size,0,6.28);fxx.fill();}}
 if(p.life>=p.max)P.splice(i,1);}fxx.globalAlpha=1;requestAnimationFrame(fxLoop);}fxLoop();
function centerOf(el){const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2,r};}
function shake(mag=8,dur=260){const el=document.getElementById('shake');const t0=performance.now();(function f(t){const k=(t-t0)/dur;if(k>=1){el.style.transform='';return;}const m=mag*(1-k);el.style.transform=`translate(${(Math.random()-.5)*m}px,${(Math.random()-.5)*m}px)`;requestAnimationFrame(f);})(t0);}
function flash(color='#fff',a=.5,dur=180){const f=document.getElementById('flash');f.style.background=color;f.style.transition='none';f.style.opacity=a;requestAnimationFrame(()=>{f.style.transition=`opacity ${dur}ms`;f.style.opacity=0;});}

  const seq=S.order.slice((round-1)%n).concat(S.order.slice(0,(round-1)%n));
  for(const id of seq){if(BT.over)return;
   BT.curTurn=id;if(BT.mode==='local'&&!S.players[id].isAI)BT.viewer=id;if(BT.mode==='host')BT.viewer=ME;const st=startTurnState(S,id);await animate(st.evs);if(BT.mode==='host')netBroadcast();
   if(checkOver())return;
   if(!S.players[id].alive||S.players[id].down){renderBattle();await sleep(120);continue;}
   if(!S.players[id].isAI){if(BT.mode==='host'&&id!==ME){BT.viewer=ME;renderBattle();const mv=await netWaitMove(id);await applyMove(id,mv);netBroadcast();}else{BT.viewer=id;if(BT.mode==='local')await handoff(id);if(isCpu()){if(BT.feverActive>0){BT.feverActive--;}BT.sp=Math.min(BT.spMax,BT.sp+1);}renderBattle();const mv=await waitPlayer();await applyMove(id,mv);if(BT.mode==='host')netBroadcast();}}
   else{renderBattle();await sleep(opt.diff==='hard'?420:520);const mv=aiTurn(S,id);await applyMove(id,mv);}
   if(checkOver())return;}
  if(S.env&&S.env.turns>0)S.env.turns--;
  if(round>=ROUND_CAP){endMatch();return;}}
}

function wishGate(res){return new Promise(resolve=>{
 const ov=document.getElementById('ovPull');const cnt=res.length;
 ov.innerHTML=`<div class="ovcard revwrap"><div class="revstage summonstage idle" id="sumstage">
   <div class="sky"></div>
   <div class="sumspeed" id="sumspeed"></div>
   <div id="lotto"><div class="godray"></div><div class="ring"></div><div class="ring" style="inset:9px;animation-direction:reverse;animation-duration:1.7s;border-color:rgba(255,255,255,.25)"></div><div class="aura"></div><div class="core"></div></div>
   <div class="reachtxt" id="rt"></div>
   <div class="wgsub">PRISMA WISH</div>
   <div class="wghint" id="wghint">タップして召喚${cnt>1?` ×${cnt}`:''}</div>
  </div></div>`;
 ov.classList.add('on');
 const g=document.getElementById('sumstage');
 const go=()=>{window.__wishGo=null;if(g){g.onclick=null;if(g.classList)g.classList.remove('idle');}const hint=document.getElementById('wghint');if(hint){hint.style.transition='opacity .35s';hint.style.opacity='0';}const sub=ov.querySelector('.wgsub');if(sub){sub.style.transition='opacity .35s';sub.style.opacity='0';}try{SFX.lock();}catch(e){}try{navigator.vibrate&&navigator.vibrate(20);}catch(e){}resolve();};
 if(g)g.onclick=go;window.__wishGo=go;
});}
function special5(){return new Promise(resolve=>{
 const o=document.createElement('div');o.className='sp5';
 o.innerHTML='<div class="sp5glow"></div><div class="sp5ring"></div><div class="sp5ring r2"></div><div class="sp5word">\u2605\uFF15</div>';
 document.body.appendChild(o);
 try{SFX.jackpot();}catch(e){}shake(9,420);try{confetti();}catch(e){}
 try{for(let k=0;k<30;k++){P.push({x:Math.random()*innerWidth,y:-10-Math.random()*120,vx:(Math.random()-.5)*.6,vy:2+Math.random()*2,life:0,max:130,size:1.6+Math.random()*2,color:Math.random()<.5?'#ffcf3f':'#fff',grav:.02,shape:'dot'});}}catch(e){}
 setTimeout(()=>{try{o.classList.add('out');}catch(e){}},1300);
 setTimeout(()=>{try{o.remove();}catch(e){}resolve();},1720);
});}
function special6(col){return new Promise(resolve=>{
 const o=document.createElement('div');o.className='sp6';
 o.innerHTML='<div class="sp6veil"></div><div class="sp6rays"></div><div class="sp6prism"><span></span><span></span><span></span></div><div class="sp6streak s1"></div><div class="sp6streak s2"></div><div class="sp6streak s3"></div><div class="sp6title"><b>PRISMATIC</b><i>\u6700\u9AD8\u4F4D \u2605\uFF16</i></div>';
 document.body.appendChild(o);
 try{SFX.reach();}catch(e){}
 (async()=>{
   await sleep(200);
   for(let q=1;q<=3;q++){const st=o.querySelector('.s'+q);if(st)st.classList.add('go');try{SFX.spin();}catch(e){}await sleep(150);}
   shake(10,320);
   const rays=o.querySelector('.sp6rays');if(rays)rays.classList.add('go');
   const pr=o.querySelector('.sp6prism');if(pr)pr.classList.add('go');
   try{SFX.crit();}catch(e){}shake(9,420);
   try{const cx=innerWidth/2,cy=innerHeight*0.46;for(let k=0;k<46;k++){const a=Math.random()*6.28,sp=3+Math.random()*5;P.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0,max:72,size:2+Math.random()*2,color:'hsl('+((k*30)%360)+',90%,62%)',grav:0,shape:'dot'});}}catch(e){}
   await sleep(780);
   const t=o.querySelector('.sp6title');if(t)t.classList.add('go');
   try{SFX.jackpot();confetti();}catch(e){}shake(12,520);
   await sleep(1200);
   try{o.classList.add('out');}catch(e){}
   await sleep(520);
   try{o.remove();}catch(e){}resolve();
 })();
});}
function whiteOut(){let w=document.getElementById('gachaWhite');if(!w){w=document.createElement('div');w.id='gachaWhite';w.style.cssText='position:fixed;inset:0;z-index:200;background:#fff;opacity:0;pointer-events:none';document.body.appendChild(w);}return w;}
function orbVibe(amp,dur,scale){const core=document.querySelector('.core');if(!core)return;scale=scale||1.15;const nowf=()=>(typeof performance!=='undefined'&&performance.now)?performance.now():Date.now();const t0=nowf();
 const tick=()=>{const k=nowf()-t0;if(k>=dur){core.style.transform='scale('+scale+')';return;}const f=1-k/dur;const jx=(Math.random()*2-1)*amp*f,jy=(Math.random()*2-1)*amp*f;core.style.transform='translate('+jx.toFixed(2)+'px,'+jy.toFixed(2)+'px) scale('+scale+')';requestAnimationFrame(tick);};
 requestAnimationFrame(tick);}
async function revealPull(res){
 const maxStar=Math.max(...res.map(r=>r.star));
 const tcol={2:'#7f8cff',3:'#5fa0ff',4:'#c06bff',5:'#ffcf3f',6:'#ff5ad6'};
 const finalCol=tcol[maxStar];
 const ov=document.getElementById('ovPull');
 await wishGate(res);
 try{
  // ===== CINEMATIC INTRO (continues on the same summon screen) =====
  const lotto=ov.querySelector('#lotto'),core=ov.querySelector('.core'),ringEl=ov.querySelector('.ring'),aura=ov.querySelector('.aura'),godray=ov.querySelector('.godray'),rt=ov.querySelector('#rt');
  const lc=()=>{const r=lotto.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};};
  await sleep(140);
  rt.style.color='#cdb6ff';rt.textContent='星を願う';
  // PHASE 0 — wish star descends
  for(let k=0;k<4;k++){const p=lc();ring(p.x,p.y,['#ff6ec7','#54e6ff','#ffcf3f'][k%3]);for(let r=0;r<12;r++){const a=Math.random()*6.28,rad=120+Math.random()*50;P.push({x:p.x+Math.cos(a)*rad,y:p.y+Math.sin(a)*rad,vx:-Math.cos(a)*3,vy:-Math.sin(a)*3,life:0,max:28,size:2.3,color:'#cdb6ff',grav:0,shape:'dot'});}SFX.spin();await sleep(230);}
  rt.textContent='';
  // PHASE 1 — charge implosion
  for(let i=0;i<16;i++){const p=lc();const ang=Math.random()*6.28,rad=85+Math.random()*70;
   P.push({x:p.x+Math.cos(ang)*rad,y:p.y+Math.sin(ang)*rad,vx:-Math.cos(ang)*(2.4+i*0.18),vy:-Math.sin(ang)*(2.4+i*0.18),life:0,max:26,size:2.6,color:'#bcd0ff',grav:0,shape:'dot'});
   if(core){core.style.transform=`scale(${1+i*0.012})`;core.style.boxShadow=`0 0 ${18+i*3}px #8aa0ff`;}
   if(ringEl)ringEl.style.animationDuration=Math.max(.25,1-i*0.05)+'s';
   SFX.spin();await sleep(84);}
  // PHASE 2 — aura color-up (rarity tease: blue->green->gold->rainbow)
  const auraCols=['#5fa0ff','#6fe23f','#ffcf3f'];
  const auraTier=maxStar>=6?3:maxStar>=5?2:maxStar>=4?1:(maxStar>=3&&Math.random()<0.5?1:0);
  for(let t=0;t<=auraTier;t++){const top=(t===auraTier),rainbow=(t>=3);
   if(t>=2){rt.style.color='#fff';rt.textContent='・・・';SFX.reach();orbVibe(6,920,1.15);try{navigator.vibrate&&navigator.vibrate([20,40,20,40,30]);}catch(e){}for(let q=0;q<3;q++){shake(5+q*3.5,260);await sleep(275);}shake(7,150);await sleep(70);}
   if(aura)aura.style.opacity='1';
   if(rainbow){shake(28,600);orbVibe(13,720,1.15);try{navigator.vibrate&&navigator.vibrate([0,140,60,160,60,200]);}catch(e){}for(let k=0;k<18;k++){const c=rainbowHue(k*24);if(k%4===0)shake(13,250);if(aura)aura.style.boxShadow=`0 0 80px 16px ${c}, inset 0 0 54px 8px #fff`;if(core)core.style.boxShadow=`0 0 64px ${c}`;flash(c,.08,90);emit(lc().x,lc().y,{n:3,color:[c,'#fff'],speed:2.4,life:20});SFX.spin();await sleep(82);}}
   else{const c=auraCols[t];if(aura)aura.style.boxShadow=`0 0 ${50+t*14}px ${10+t*3}px ${c}, inset 0 0 46px 6px ${c}`;if(core)core.style.boxShadow=`0 0 ${46+t*10}px ${c}`;ring(lc().x,lc().y,c);flash(c,.13,150);emit(lc().x,lc().y,{n:9,color:[c,'#fff'],speed:3,life:28});}
   if(t>0){SFX.coin();shake(11+t*5,320);orbVibe(7+t*3,460,1.15);try{navigator.vibrate&&navigator.vibrate(t>=2?[0,70,40,90]:55);}catch(e){}}
   rt.textContent='';await sleep(top?380:250);}
  // PHASE 3 — high-rarity cut-in
  if(maxStar>=6){SFX.reach();shake(18,420);await gachaCutin('#33c6e6','激アツ',560);}
  else if(maxStar===5){SFX.reach();shake(16,420);await gachaCutin('#ffcf3f','激アツ',680);}
  // concentration lines spin in while the screen flashes slowly to pure white
  const ss=ov.querySelector('#sumspeed'),stg=ov.querySelector('#sumstage');
  if(stg)stg.style.setProperty('--rc',finalCol);
  const wo=whiteOut();wo.style.transition='opacity '+(maxStar>=5?2.7:2.4)+'s ease';void wo.offsetWidth;
  if(ss)ss.style.opacity=(maxStar>=5?'.78':'.58');
  wo.style.opacity='1';
  SFX.reach();
  await sleep(maxStar>=5?2700:2400);
  shake(22,460);SFX.crit();try{navigator.vibrate&&navigator.vibrate([0,90,40,120]);}catch(e){}
  await sleep(160);
 }catch(e){}
 // ===== ONE-BY-ONE REVEAL (tap to advance, skip available) =====
 try{await sequentialReveal(res,tcol);}catch(e){}
 // ===== SUMMARY GRID =====
 showResultGrid(res,finalCol,tcol);
}
function sequentialReveal(res,tcol){return new Promise(resolve=>{
 const ov=document.getElementById('ovPull');
 ov.innerHTML=`<div class="ovcard revwrap"><div class="revstage" id="revstage" style="--rc:#5fa0ff">
   <div class="sky"></div><div class="revwash" id="revwash"></div><div class="revradiance" id="revrad"></div><div class="revspeed" id="revspeed"></div><div class="auraglow" id="revaura"></div><div class="halo" id="revhalo"></div><div class="beam" id="revbeam"></div>
   <div class="revcount" id="revcount"></div><button class="revskip" onclick="window.__revSkip&&window.__revSkip()">スキップ »</button>
   <div class="revorbwrap"><div class="revpedestal"></div><div class="revorb" id="revorb"></div></div>
   <div class="revstars" id="revstars"></div>
   <div class="revnew" id="revnew">NEW</div>
   <div class="revname" id="revname"></div><div class="revsub" id="revsub"></div>
   <div class="revhint" id="revhint">タップで次へ</div>
  </div></div>`;
 ov.classList.add('on');
 const wo=document.getElementById('gachaWhite');if(wo){requestAnimationFrame(()=>{wo.style.transition='opacity .7s ease';wo.style.opacity='0';});setTimeout(()=>{try{wo.remove();}catch(e){}},1000);}
 const stage=document.getElementById('revstage');
 let skip=false;
 const fin=()=>{try{stage.onclick=null;}catch(e){}window.__revNext=null;window.__revSkip=null;resolve();};
 window.__revSkip=()=>{skip=true;if(window.__revNext)window.__revNext();};
 stage.onclick=(e)=>{if(e&&e.target&&e.target.classList&&e.target.classList.contains('revskip'))return;if(window.__revNext)window.__revNext();};
 const waitTap=()=>new Promise(r=>{window.__revNext=()=>{window.__revNext=null;r();};});
 (async()=>{ for(let i=0;i<res.length;i++){ if(skip)break; await revealOne(res[i],i,res.length,tcol); if(skip)break; await waitTap(); } fin(); })();
});}
async function revealOne(r,i,total,tcol){
 const elcol={fire:'#ff5a3c',water:'#33c6e6',grass:'#6fe23f',thunder:'#ffd23f',poison:'#b14cff'};
 const elJ={fire:'火',water:'水',grass:'草',thunder:'雷',poison:'毒'};
 const col=tcol[r.star]||'#5fa0ff';
 const acc=(r.kind==='char'?(elcol[r.item.el]||col):col);
 const radO={2:.12,3:.18,4:.3,5:.42,6:.52}[r.star]||.2;
 const washO={2:.06,3:.09,4:.14,5:.2,6:.26}[r.star]||.08;
 const stage=document.getElementById('revstage'),orb=document.getElementById('revorb'),beam=document.getElementById('revbeam'),halo=document.getElementById('revhalo');
 const rad=document.getElementById('revrad'),wash=document.getElementById('revwash'),speed=document.getElementById('revspeed');
 const starsEl=document.getElementById('revstars'),nameEl=document.getElementById('revname'),subEl=document.getElementById('revsub'),newEl=document.getElementById('revnew'),hint=document.getElementById('revhint'),cnt=document.getElementById('revcount');
 if(stage)stage.style.setProperty('--rc',col);
 [orb,nameEl,subEl,newEl,hint,beam,halo].forEach(e=>e&&e.classList&&e.classList.remove('show'));
 if(rad)rad.style.opacity='0';if(wash)wash.style.opacity='0';if(speed)speed.classList.remove('hit');
 if(starsEl)starsEl.innerHTML='';if(nameEl)nameEl.textContent='';if(subEl)subEl.textContent='';
 if(cnt)cnt.textContent=total>1?(i+1)+' / '+total:'';
 if(orb)orb.innerHTML=(r.kind==='char'?emblem(store.equipSkin,r.item.el):emblem(r.item.id,'fire')).replace('class="crest"','class="crest" style="width:128px;height:128px"');
 if(r.star>=6){await special6(col);}else if(r.star===5){await special5();}
 await sleep(40);
 const oc=()=>{const o=document.getElementById('revorb');const b=o&&o.getBoundingClientRect?o.getBoundingClientRect():null;if(b&&b.width)return{x:b.left+b.width/2,y:b.top+b.height/2};const sb=stage&&stage.getBoundingClientRect?stage.getBoundingClientRect():{left:0,top:0,width:innerWidth,height:400};return{x:sb.left+sb.width/2,y:sb.top+sb.height*0.42};};
 const p=oc();
 // light gathers
 if(beam)beam.classList.add('show');if(wash)wash.style.opacity=washO;
 flash(col,r.star>=4?0.26:0.12,260);SFX.spin();await sleep(170);
 for(let k=0;k<14;k++){const a=Math.random()*6.28,rad2=120+Math.random()*30;P.push({x:p.x+Math.cos(a)*rad2,y:p.y+Math.sin(a)*rad2,vx:-Math.cos(a)*3.1,vy:-Math.sin(a)*3.1,life:0,max:24,size:2.3,color:k%3?col:acc,shape:'dot'});}
 await sleep(400);
 // orb materialize
 if(orb)orb.classList.add('show');if(halo)halo.classList.add('show');if(rad)rad.style.opacity=radO;
 if(speed){speed.classList.remove('hit');void(speed.offsetWidth);speed.classList.add('hit');}
 ring(p.x,p.y,col);ring(p.x,p.y,'#fff');
 emit(p.x,p.y,{n:r.star>=5?40:r.star>=4?26:16,color:[col,'#fff'],speed:r.star>=5?6.8:4.6,life:54,size:3.4});
 if(r.kind==='char')emit(p.x,p.y,{n:r.star>=5?16:8,color:[acc,'#fff'],speed:3.4,life:40,size:2.6});
 if(r.star>=4){shake(r.star>=5?15:9,320);try{navigator.vibrate&&navigator.vibrate(r.star>=5?70:30);}catch(e){}}
 if(r.star>=5){flash(col,.34,300);SFX.jackpot();confetti();}else SFX.coin();
 // ascending sparkles for high rarity
 if(r.star>=5){for(let k=0;k<16;k++){P.push({x:p.x+(Math.random()-.5)*150,y:p.y+50+Math.random()*40,vx:(Math.random()-.5)*.5,vy:-(1+Math.random()*1.5),life:0,max:96,size:1.4+Math.random()*1.8,color:Math.random()<.5?col:'#fff',grav:-0.004,shape:'dot'});}}
 if(r.star>=6){for(let k=0;k<10;k++){const cc=rainbowHue(k*36);flash(cc,.07,90);emit(p.x,p.y,{n:3,color:[cc,'#fff'],speed:2.6,life:24});await sleep(96);}}
 await sleep(340);
 // star fan
 for(let st=0;st<r.star;st++){const b=document.createElement('b');b.textContent='★';if(starsEl)starsEl.appendChild(b);(function(bb){setTimeout(()=>{if(bb&&bb.classList)bb.classList.add('pop');},st*130);})(b);if(st>=4)SFX.sel();}
 await sleep(r.star*130+300);
 if(nameEl){nameEl.textContent=r.item.name;nameEl.classList.add('show');}
 if(subEl){subEl.textContent=(r.kind==='char'?((elJ[r.item.el]||'')+'属性キャラ'):'スキン')+(r.extra?(' ・ '+r.extra):'');subEl.classList.add('show');}
 if(r.isNew&&newEl)newEl.classList.add('show');
 await sleep(280);
 if(hint){hint.textContent=(i+1>=total)?'タップで結果へ':'タップで次へ';hint.classList.add('show');}
}
function showResultGrid(res,finalCol,tcol){
 const ov2=document.getElementById('ovPull');
 const hi=res.filter(r=>r.star>=5).length,news=res.filter(r=>r.isNew).length;
 ov2.innerHTML=`<div class="ovcard revwrap"><div class="resultscreen" style="--rc:${finalCol}"><div class="sky"></div><div class="resinner"><h3 class="orb" style="font-size:18px;color:${finalCol};letter-spacing:2px">RESULT</h3>
  ${res.length>1?`<div class="muted" style="font-size:11px;margin-top:3px">${res.length}連${hi?` ・ <span style="color:var(--gold)">★5以上 ${hi}</span>`:''}${news?` ・ NEW ${news}`:''}</div>`:''}
  <div class="grid" id="resGrid" style="margin-top:12px">${res.map((r,i)=>{const it=r.item;const isCh=r.kind==='char';
   return `<div class="cell rcell" id="rc-${i}" style="opacity:0;transform:scale(.6);border-color:${rarCol(r.star)};box-shadow:${r.star>=4?'0 0 18px -4px '+rarCol(r.star):'none'}">${r.isNew?'<div class="eq" style="background:var(--bad);color:#fff">NEW</div>':''}
    <div class="cc">${isCh?emblem(store.equipSkin,it.el):`<div style="width:46px;height:46px;margin:0 auto">${emblem(it.id,'fire')}</div>`}</div>
    <div class="cn">${it.name}</div><div class="stars" style="color:${rarCol(r.star)}">${starStr(r.star)}</div>
    ${r.extra?`<div class="muted" style="font-size:8.5px;margin-top:2px">${r.extra}</div>`:''}</div>`;}).join('')}</div>
  <button class="btn orb" style="margin-top:16px" onclick="document.getElementById('ovPull').classList.remove('on');renderGacha()">OK</button></div></div></div>`;
 ov2.classList.add('on');
 res.forEach((r,i)=>{setTimeout(()=>{const c=document.getElementById('rc-'+i);if(!c)return;c.style.transition='transform .26s cubic-bezier(.2,1.4,.3,1),opacity .26s';c.style.opacity='1';c.style.transform='scale(1)';
  try{const b=c.getBoundingClientRect();const cx=b.left+b.width/2,cy=b.top+b.height/2;if(r.star>=4){const pc=tcol[r.star];ring(cx,cy,pc);emit(cx,cy,{n:r.star>=5?16:8,color:[pc,'#fff'],speed:3,life:30});}}catch(e){}
  if(r.star>=5)SFX.coin();else SFX.sel();},120+i*90);});
}
async function doPull(kind,count){aInit();let res=null;try{res=store.pull(kind,count);}catch(e){}if(!res){toast('クリスタルが足りません');SFX.tap();return;}await revealPull(res);}
async function doFree(){aInit();let res=null;try{res=store.freePull();}catch(e){}if(!res){toast('本日の無料ガチャは使用済みです');SFX.tap();return;}await revealPull(res);}

/* ---- init ---- */
(async function(){await store.load();applyTheme();renderHome();renderMuteAll();document.addEventListener('pointerdown',()=>aInit(),{once:true});})();
</script></body></html>
